site_name: Annotated EU AI Act
site_url: https://bojkovski-cpu.github.io/ai-act-annotated
site_description: Comprehensive annotated version of the EU Artificial Intelligence Act (Regulation EU 2024/1689) with cross-references and commentary
site_author: bojkovski-cpu

# Repository
repo_name: bojkovski-cpu/ai-act-annotated
repo_url: https://github.com/bojkovski-cpu/ai-act-annotated
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024 | EU AI Act (Regulation EU 2024/1689) - Official text © European Union

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  
  # Favicon and logo
  favicon: assets/favicon.png
  logo: assets/logo.png
  
  # Color scheme
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  font:
    text: Inter
    code: Roboto Mono
  
  features:
    - announce.dismiss          # Dismissible announcements
    - content.action.edit       # Edit button on pages
    - content.action.view       # View source button
    - content.code.copy         # Copy code blocks
    - content.tabs.link         # Link tabs across pages
    - content.tooltips          # Improved tooltips
    - navigation.expand         # Expand navigation by default
    - navigation.footer         # Previous/next navigation
    - navigation.indexes        # Section index pages
    - navigation.instant        # Instant loading
    - navigation.instant.prefetch  # Prefetch pages
    - navigation.instant.progress  # Progress indicator
    - navigation.path           # Show breadcrumbs
    - navigation.sections       # Navigation sections
    - navigation.tabs           # Top-level tabs
    - navigation.tabs.sticky    # Sticky tabs
    - navigation.top            # Back to top button
    - navigation.tracking       # Anchor tracking
    - search.highlight          # Highlight search terms
    - search.share              # Share search link
    - search.suggest            # Search suggestions
    - toc.follow                # Follow TOC with scroll
    - toc.integrate             # Integrate TOC in sidebar

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
    - Introduction: introduction.md
    - How to Use This Site: how-to-use.md
    - Key Concepts: key-concepts.md
  
  - Recitals:
    - recitals/index.md
    - "Recital (1)": recitals/recital-001.md
    - "Recital (2)": recitals/recital-002.md
    - "Recital (3)": recitals/recital-003.md
    - "Recital (4)": recitals/recital-004.md
    - "Recital (5)": recitals/recital-005.md
    - "... (View All 138 Recitals)": recitals/index.md
  
  - Articles:
    - "Chapter I - General Provisions":
      - articles/chapter-01/index.md
      - "Article 1 - Subject Matter": articles/chapter-01/article-01.md
      - "Article 2 - Scope": articles/chapter-01/article-02.md
      - "Article 3 - Definitions": articles/chapter-01/article-03.md
      - "Article 4": articles/chapter-01/article-04.md
    
    - "Chapter II - Prohibited AI Practices":
      - articles/chapter-02/index.md
      - "Article 5": articles/chapter-02/article-05.md
    
    - "Chapter III - High-Risk AI Systems":
      - articles/chapter-03/index.md
      - "Articles 6-51": articles/chapter-03/article-06.md
    
    - "Chapter IV - Transparency Obligations":
      - articles/chapter-04/index.md
      - "Article 52": articles/chapter-04/article-52.md
    
    - "Chapter V - General-Purpose AI Models":
      - articles/chapter-05/index.md
      - "Articles 53-56": articles/chapter-05/article-53.md
    
    - "Chapter VI - Innovation Support":
      - articles/chapter-06/index.md
    
    - "Chapter VII - Governance":
      - articles/chapter-07/index.md
    
    - "Chapter VIII - EU Database":
      - articles/chapter-08/index.md
    
    - "Chapter IX - Post-Market Monitoring":
      - articles/chapter-09/index.md
    
    - "Chapter X - Codes of Conduct":
      - articles/chapter-10/index.md
    
    - "Chapter XI - Delegation of Power":
      - articles/chapter-11/index.md
    
    - "Chapter XII - Penalties":
      - articles/chapter-12/index.md
      - "Article 99 - Penalties": articles/chapter-12/article-99.md
      - "Article 100": articles/chapter-12/article-100.md
      - "Article 101": articles/chapter-12/article-101.md
    
    - "Chapter XIII - Final Provisions":
      - articles/chapter-13/index.md
  
  - Annexes:
    - annexes/index.md
  
  - Cross-References:
    - cross-references/index.md
    - "GDPR Mapping": cross-references/gdpr.md
    - "DSA Mapping": cross-references/dsa.md
    - "DMA Mapping": cross-references/dma.md
    - "Product Safety": cross-references/product-safety.md
  
  - Guidance:
    - "Compliance Checklist": guidance/compliance-checklist.md
    - "Implementation Timeline": guidance/implementation-timeline.md
    - "Industry Guides":
      - "Healthcare AI": guidance/industry-guides/healthcare.md
      - "Financial Services": guidance/industry-guides/finance.md
      - "Employment AI": guidance/industry-guides/employment.md
      - "Law Enforcement": guidance/industry-guides/law-enforcement.md
  
  - Drafting History:
      - Overview: history/index.md
      - Commission Proposal (April 2021):
          - Overview: history/commission-2021/index.md
          - Articles: history/commission-2021/articles/
          - Recitals: history/commission-2021/recitals/
      - Parliament Position (June 2023):
          - Overview: history/parliament-2023/index.md
          - Articles: history/parliament-2023/articles/
          - Recitals: history/parliament-2023/recitals/
      - Final Adopted Text (June 2024):
          - Overview: history/final-2024/index.md
          - Articles: history/final-2024/articles/
          - Recitals: history/final-2024/recitals/

  - Resources:
    - "Glossary": resources/glossary.md
    - "FAQ": resources/faq.md
    - "External Links": resources/external-links.md
    - "About": resources/about.md

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang: en
  - tags:
      tags_file: tags.md
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 3
  
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Custom CSS and JavaScript
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Extra configuration
extra:
  version:
    provider: mike
    default: latest
  
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bojkovski-cpu/ai-act-annotated
      name: GitHub Repository
  
  generator: false  # Remove "Made with Material for MkDocs"

# Validation
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
